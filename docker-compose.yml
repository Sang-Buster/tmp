services:
  # Qdrant - Vector database for telemetry and logs
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sim_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

volumes:
  qdrant_data:
